services:
  timescaledb:
    image: timescale/timescaledb-ha:pg16
    container_name: screener_timescaledb
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # SQL-файлы выполняются в алфавитном порядке при ПЕРВОМ старте кластера.
      - ./db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: screener_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ingestion:
    build: ./ingestion
    container_name: screener_ingestion
    env_file: .env
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  api:
    build: ./api
    container_name: screener_api
    env_file: .env
    ports:
      # Host-порт берётся из API_PORT (.env), по умолчанию 8000.
      - "${API_PORT:-8000}:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: screener_frontend
    env_file: .env
    ports:
      - "5173:5173"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
