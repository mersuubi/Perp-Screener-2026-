# Конфиг линтера. Сознательно мягкий — проект-портфолио, не продакшн-монорепо.
line-length = 100
target-version = "py311"

[lint]
select = ["E", "F", "W", "I"]   # pycodestyle, pyflakes, isort
ignore = [
    "E501",   # длинные строки (SQL/комментарии на русском бывают длинными)
    "E402",   # импорт не в начале файла (нужно для sys.path в тестах)
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]
