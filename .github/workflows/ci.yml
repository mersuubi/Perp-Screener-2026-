name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (api) + tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt
          pip install ruff pytest

      - name: Lint (ruff)
        run: ruff check api ingestion

      - name: Tests (pytest)
        run: pytest api/tests -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install & type-check + build
        working-directory: frontend
        run: |
          npm install
          npm run build
